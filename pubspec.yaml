name: mars_explorer_app
description: "A new Flutter project."
publish_to: 'none' # Prevents accidental publishing to pub.dev

# App version: major.minor.patch+build_number
version: 1.0.0+1

# Dart SDK version constraint
environment:
  sdk: ^3.10.0-290.4.beta

# Runtime dependencies (packages your app needs to run)
dependencies:
  flutter:
    sdk: flutter
  
  # iOS-style icons
  cupertino_icons: ^1.0.8
  
  # Opens URLs in browser/email/phone apps
  url_launcher: ^6.2.5

# Development dependencies (only used during development/testing)
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting rules for code quality
  flutter_lints: ^6.0.0
  
  # Generates app icons for Android/iOS
  flutter_launcher_icons: ^0.13.1

# Configuration for flutter_launcher_icons package
flutter_launcher_icons:
  android: true  # Generate Android icons
  ios: true      # Generate iOS icons
  image_path: "assets/icons/icon.png"  # Source image (must be at least 1024x1024)

# Flutter-specific configuration
flutter:
  uses-material-design: true  # Includes Material Design icons
  
  # Uncomment to add image/file assets to your app
  assets:
    - assets/icons/icon.png        # Your app icon source
  #   - assets/images/         # Include all images in this folder
  
  # Uncomment to add custom fonts
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700